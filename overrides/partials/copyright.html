{%- set copyright = config.copyright or config.extra.get("copyright") %}
{%- if copyright %}
  <div class="md-footer__copyright" style="direction: ltr !important; text-align: center !important; color: #000000 !important; font-size: 1rem !important; width: 100% !important; display: block !important;">
    <div class="md-footer__copyright-highlight" style="display: inline-block !important;">
      {{ copyright }}
      {%- if config.extra.get("website") %}
        &bull; <a href="{{ config.extra.website }}" target="_blank" rel="noopener" style="color: #000000 !important; font-weight: normal !important; text-decoration: underline !important; font-size: 0.9rem !important;">{{ config.extra.get("website_name", "solhjoo.com") }}</a>
      {%- endif %}
    </div>
  </div>
{%- endif %}
